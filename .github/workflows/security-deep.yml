name: Security Deep Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # 3 AM UTC every Sunday

permissions:
  actions: read
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Security tab

jobs:
  trivy-scan:
    name: Trivy Filesystem CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  codeql:
    name: CodeQL Semantic Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add 'javascript' or 'java' here if your fork extends beyond Python
        language: ['python']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  owasp-dependency-check:
    name: OWASP Dependency-Check CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'mcp-atlassian'
          path: '.'
          format: 'ALL'
          out: 'owasp-reports'
          args: --enableRetired

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: owasp-reports/dependency-check-report.sarif
          category: owasp-dependency-check

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-${{ github.run_id }}
          path: owasp-reports/
          retention-days: 14
