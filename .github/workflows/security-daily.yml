name: Security Daily Scan

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC every day
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency CVE Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run uv audit (CVE scan)
        run: uv audit --format json > audit-results.json || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-audit-${{ github.run_id }}
          path: audit-results.json
          retention-days: 14

  secrets-scan:
    name: Secrets Leak Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full git history required

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-results-${{ github.run_id }}
          path: results.sarif
          retention-days: 14

  python-sast:
    name: Python SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"

      - name: Run Bandit
        run: |
          uvx bandit \
            -r src/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            || true

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/security-audit
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sast-results-${{ github.run_id }}
          path: |
            bandit-results.json
            semgrep.sarif
          retention-days: 14
